reddit: []         # Step 7b — needs Reddit OAuth credentials in .env

hn:
  - name: hn
    enabled: true
    publication: "Hacker News (AI filter)"
    source_type: hn_post
    poll_interval_seconds: 14400
    rate_limit_key: hn-algolia
    # HN adapter has its own .py module (custom JSON, not RSS).

hf_daily_papers: [] # Step 9 — HF Daily Papers
podcasts: []       # Step 10
benchmarks: []     # Step 8

# Shared rate-limit broker. Each adapter declares a rate_limit_key; broker
# enforces per-key caps so multiple Substack adapters share one budget.
rate_limits:
  default:
    requests_per_minute: 30
  substack:
    requests_per_minute: 30
  news.smol.ai:
    requests_per_minute: 30
  tldr.tech:
    requests_per_minute: 30
  lastweekin.ai:
    requests_per_minute: 30
