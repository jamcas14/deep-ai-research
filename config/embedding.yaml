# Patch AAA (2026-05-05) — embedding model configuration.
#
# Default: snowflake-arctic-embed-s (33M params, 384-dim, Apache-2.0).
# This is the v1 corpus default — every existing chunk's vector lives in a
# 384-dim vec0 table, so changing `dim` requires re-embedding the entire
# corpus (~2-4h CPU on 8K chunks).
#
# ⚠ DO NOT MIGRATE under the current compute envelope.
# (See ~/.claude/projects/.../memory/feedback_no_gpu_no_api.md for the rule.)
#
# The recommended target was Qwen3-Embedding-0.6B (610M params, 1024-dim,
# MTEB-R 61.82). It IS a local-CPU model and fits the "no API key" half of
# the envelope, but it does NOT fit the "stay light enough that interactive
# runs don't degrade" half:
#
#   metric                       arctic-embed-s    Qwen3-Embedding-0.6B
#   ---------------------------  ----------------  --------------------
#   parameters                   33M               610M       (~18×)
#   RAM (fp32)                   ~130MB            ~1.5GB     (~12×)
#   CPU latency / query          ~50ms             ~250-500ms (~5-10×)
#   retrieval-call cost / run    barely felt       +5-10s across ~25 calls
#   one-time corpus re-embed     ~7 min            ~70 min
#   MTEB-R                       ~57               61.82      (+9% lift)
#
# The 9% retrieval-quality lift is real but not worth degrading every
# /deep-ai-research run by 5-10s. Bigger leverage comes from Patches NN
# (mention detection), VV (domain penalty), and ZZ (cross-run memory),
# all of which are CPU-cheap or subscription-based.
#
# If you ever DO decide to migrate (e.g. acquire spare GPU time, accept
# the latency, batch with contextual chunking), the procedure is:
#   1. Stop the systemd-timer ingest service.
#   2. Run `python -m ingest.migrate_embedding --to Qwen/Qwen3-Embedding-0.6B
#      --dim 1024 --confirm`.
#   3. Restart the systemd-timer ingest service.
# The migration script backs up the sqlite DB and config first.
#
# DO NOT change `dim` here without running the migration — the vec0 table
# enforces the dimension at insert-time, so a mismatch will cause all
# subsequent chunk-embeds to fail.

model: Snowflake/snowflake-arctic-embed-s
dim: 384
device: auto                   # auto | cuda | cpu — `auto` falls back to cpu
                                # when no CUDA is available; current default
                                # arctic-embed-s is fast enough on CPU that
                                # forcing GPU would only matter for a future
                                # model swap.
