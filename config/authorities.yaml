# authorities.yaml — source of truth for the authority graph.
#
# This file is hand-edited by the user. The DB caches it (table: authorities) but
# rebuilds the cache on every reload. YAML deletions soft-delete in the DB.
# See docs/authority-rules.md for engagement-detection rules and weighting.
#
# Tiers:
#   canonical (1.0) — sustained track record, frontier-lab leads / core researchers
#   trusted   (0.7) — strong contributors, narrower domains
#   signal    (0.5) — reliable but lower-volume / niche
#
# Each entry needs: name, weight, tier, handles. `notes` is optional but useful
# for future-you to remember why this person is on the list.
#
# This is a SEED list. Expand as you go. Aim for 50-200 entries; more dilutes
# the signal. Run the monthly source-discovery job to surface candidates.

