# Patch TT — cross-encoder reranker config.
#
# ⚠ KEEP DISABLED under the current compute envelope.
# (See ~/.claude/projects/.../memory/feedback_no_gpu_no_api.md for the rule.)
#
# bge-reranker-v2-m3 is 568M params and runs at ~1-2s per query for the
# top-50 candidates on CPU. That's bad enough on its own; combined with
# the per-researcher 8-call cap, a single /deep-ai-research run would
# spend 4-8 minutes JUST on reranking. The compute envelope says: small
# CPU models (arctic-embed-s 33M, ~50ms) only in the retrieval hot path.
# Rerankers don't fit.
#
# The skeleton stays in the repo so it can be flipped on cleanly if the
# constraint relaxes (e.g. spare GPU time, smaller corpus where latency
# stops mattering, or someone ships a 100M-param reranker). But under
# the current envelope, the marginal quality lift (15% MTEB-R on a query
# subset) does not justify multi-minute retrieval slowdown.
#
# If you ever DO enable this:
#   1. Run `uv sync --extra reranker` to install sentence-transformers + torch.
#   2. Set `enable: true` here, OR `DAIR_RERANKER_ENABLED=1` in env.
#   3. First call downloads ~500MB of model weights from HuggingFace.
#
# Once enabled, retrieval scoring becomes:
#   final_score = rerank_score * authority_boost * recency_decay * domain_penalty
#
# (replacing RRF as the relevance signal — boost / decay / penalty still apply).

enable: false

# Default: BAAI/bge-reranker-v2-m3 (568M, Apache 2.0, MTEB-R 57.03).
# Alternative: Qwen/Qwen3-Reranker-0.6B (MTEB-R 65.80). The Qwen model needs
# custom inference code (AutoModelForCausalLM + yes/no token trick) which is
# NOT yet wired in corpus_server/reranker.py. Use bge if you ever turn this on.
model: BAAI/bge-reranker-v2-m3

# Top-K from RRF to rerank. Larger K → better quality, slower. 50 balances both.
top_k: 50
