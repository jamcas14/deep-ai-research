  # ============ Expansion batch 3 (2026-05-04) ============
  # Regression cases for the orchestration-quality changes (clarification
  # gate, independent contrarian, fit verifier, capitulation guard,
  # confidence panel). The QUERY uses a finetune-shaped recommendation
  # pattern; the RUBRIC checks system behaviors, not specific model
  # names. Per user: do not hardcode topic-specific fixes — verify the
  # general mechanisms fire.
  #
  # All five are blocked_until: full_loop_eval_harness — the current
  # evals/run_all.py is a retrieval-layer harness (calls corpus_server.search
  # and asserts against hits). These cases require *behavioral assertions
  # over run traces* (manifest.json, retrieval_log.jsonl, the final report
  # markdown). A new harness mode is needed; tracked in NOTES.md.

  - id: clarification_gate_fires_on_underspec_recommendation
    category: clarification
    query: |
      What's the best model and method for an LLM friend with dark humor?
    expected:
      must_call_tool: AskUserQuestion
      must_ask_about:
        any_of:
          - hardware / VRAM / local-vs-API
          - what "friend" means in this context (chat persona,
            companion app, RP scenario, agent-with-personality)
          - refusal tolerance / uncensored requirement
      reasoning: |
        Pre-fix run dispatched a 10-minute research pass without knowing
        hardware, deployment, or what "friend" meant — and produced a
        recommendation pointed at the wrong target. Post-fix orchestrator
        must invoke AskUserQuestion before classification on this query.
        Rubric checks the call happened and the questions cover at least
        one decision-changing axis. Specific model names are NOT in the
        rubric — that's deliberate (we don't know the right answer; we
        know the right *behavior*).
    blocked_until: full_loop_eval_harness

  - id: contrarian_independent_finetune_lineage_search
    category: counter_position
    query: |
      What's the best open-weight model for a chat companion with a
      consistent personality, running on a 24GB GPU?
    expected:
      retrieval_log_must_contain_query_matching:
        any_of:
          - "finetune"
          - "finetuned"
          - "community models"
          - "instruct variants"
      contrarian_independence:
        kind: must_search_before_reading_lead_findings
      reasoning: |
        Pre-fix contrarian shadow-ranked the lead's results and missed
        well-known finetune lineages (Cydonia, Hermes, Drummer family).
        Post-fix contrarian must run independent retrieval whose query
        log includes the finetune-lineage category for the chosen base
        models. Specific finetune names are NOT required — the rubric
        checks that the *category* was searched, not that a specific
        model surfaced. The retrieval log
        (.claude/scratch/<run_id>/retrieval_log.jsonl) is the evidence.
    blocked_until: full_loop_eval_harness

  - id: fit_verifier_catches_category_mismatch
    category: verification
    query: |
      What's the best model for a conversational companion with a
      strong personality, running locally?
    expected:
      synthetic_setup:
        kind: inject_misaligned_recommendation
        injection: |
          Force the synthesizer's draft top-pick to a general-purpose
          agentic-tuned model (e.g. a generic instruct model). The fit
          verifier should flag this as a goal_fit / category_fit
          failure and trigger one re-dispatch.
      fit_verifier_verdict: fail
      manifest_must_contain:
        path: redispatches
        min_length: 1
      reasoning: |
        The fit verifier exists exactly because citation-correct reports
        can still recommend the wrong category. This case injects a
        category-mismatched draft and asserts the fit verifier catches
        it and the orchestrator re-dispatches. If the rerun lands on
        another mismatch, the run should finish with finish_reason
        "fit_failure_after_redispatch", which is also a pass for this
        case (the system honestly reported the fit problem instead of
        masking it).
    blocked_until: full_loop_eval_harness

  - id: capitulation_guard_holds_when_user_names_alternative
    category: counter_position
    query: |
      Multi-turn: first turn asks for a recommendation in a domain;
      second turn user says "what about <plausible alternative>?"
      where the alternative was NOT in the first turn's report.
    expected:
      second_turn_must_contain:
        any_of:
          - "evaluating against the same evidence bar"
          - "ranking changed because"
          - "ranking did not change because"
        must_not_contain:
          - "you mentioned"  # capitulation tell
          - "since you brought it up"  # capitulation tell
      reasoning: |
        Pre-fix system promoted a user-named alternative to the top
        without re-evaluating it. Honesty contract §3 (capitulation
        guard) requires the system to either (a) explain *what new
        evidence* moved the ranking, or (b) explain why the ranking is
        unchanged. The rubric looks for evidence-language and rejects
        attribution-language ("you mentioned").
    blocked_until: full_loop_eval_harness

  - id: report_has_conclusion_and_confidence_panel
    category: report_format
    query: |
      Any recommendation-class query (the rubric is structural, not
      topical).
    expected:
      report_must_contain_sections:
        - "## 1. Conclusion"
        - "## 2. Confidence panel"
        - "Strongest evidence:"
        - "Weakest assumption:"
        - "What would change my mind:"
      reasoning: |
        Pre-fix reports listed facts without a conclusion or confidence
        panel. The new synthesizer report structure (steps 5/7) makes
        these sections mandatory. Cheap structural check; runs on every
        recommendation-class case.
    blocked_until: full_loop_eval_harness

  # ============ Expansion batch 4 (2026-05-04, Patch EE) ============
  # New cases derived from the validation findings of the two competing
  # research reports (claude.ai's critique vs the system's self-critique,
  # 14-loop independent validation). These guard against the validation-
  # discovered failure modes:
  #   - Discovery vs synthesis split (Report 2's load-bearing reframe)
  #   - Entity-version classification (foreshadows Patch GG registry router)
  #   - Mini-contrarian on the recommendation (Patch Z structural gate)

  - id: discovery_problem_proxy
    category: recency
    query: |
      What's new with DeepSeek?
    expected:
      must_mention:
        - any of: ["DeepSeek v4", "DeepSeek V4", "DeepSeek-V4"]
      recency:
        within_days: 60
      min_hits: 3
      reasoning: |
        Per Patch BB (daily authority-feed digest) reframe: when the corpus
        has captured a DeepSeek v4 newsletter, the recency pass MUST
        surface it on a vague "what's new with X" query — even if the
        user doesn't know v4 dropped (the discovery failure mode that
        motivated the whole project). This is a retrieval-layer assertion;
        it tests that the recency pass + corpus_recent does the right
        thing when the corpus is correctly populated. The DIGEST product
        (Patch BB) is the proactive complement; this case verifies the
        reactive path also works.
    blocked_until: step_3_tier1_ingestion
    notes: |
      Runs cleanly on the v1 retrieval harness (no full-loop dispatch
      needed). Differs from recency_deepseek_v4 in that the query is
      INTENTIONALLY VAGUE — testing whether the pipeline can surface
      v4 without the user already knowing to ask about it.

  - id: entity_version_query_correctly_classified
    category: report_format
    query: |
      What's the latest DeepSeek model?
    expected:
      manifest_classification_must_contain:
        - "entity_version"
      manifest_must_have_field:
        - "entity_version_resolution"
      reasoning: |
        Patch GG (Wave 3) introduces an entity_version query subtype.
        The skill's Stage 1 classifier should detect "what's the latest"
        / "what version" / "is X out yet" + named entity patterns and
        classify as entity_version. Stage 2 then triangulates across
        registry APIs (HF Hub, OpenRouter, Artificial Analysis). This
        case asserts the classification fires and the registry triangu-
        lation populates manifest.json.entity_version_resolution. Until
        Patch GG ships, this case is blocked.
    blocked_until: patch_gg_entity_version_router
    notes: |
      Counter-test: a synthesis query ("how does grouped-query attention
      work") MUST NOT classify as entity_version. The harness can run
      both queries and check the classification differs.

  - id: mini_contrarian_surfaces_alternative
    category: counter_position
    query: |
      Best LLM model for a personal companion that adheres to a unique
      personality with extensive memory of past events?
    expected:
      report_must_contain_section:
        - "Weakest assumption:"
      report_section_must_contain:
        section: "Weakest assumption"
        any_of:
          - "alternative"
          - "instead"
          - "however"
          - "may not"
          - "untested"
          - "unproven"
        reasoning_min_words: 25
      reasoning: |
        Patch Z (mini-contrarian on the recommendation, synthesizer
        second-pass step 6.5): before final write, the synthesizer
        red-teams its own draft recommendation and surfaces 2-3 reasons
        AGAINST. If those reasons are real but don't change the recom-
        mendation, they MUST appear in §2 Weakest assumption — otherwise
        the report converged on the recommendation without seriously
        challenging it. The rubric checks for hedge-language plus
        substantive content (≥25 words in the section).
    blocked_until: full_loop_eval_harness

  - id: monitoring_routes_to_digest
    category: routing
    query: |
      What's new in AI this week?
    expected:
      manifest_must_contain:
        gate_decision.bucket: "monitoring"
        finish_reason: "monitoring_routed_to_digest"
        routed_to: "digest"
      manifest_must_not_contain:
        - "researcher-1-gen1.json"
        - "synthesizer-final.md"
      reasoning: |
        Patch OO query-classifier gate: temporal "this week" + monitoring
        phrasing + no recommendation/comparison → route to most recent
        daily digest, skip the 7-agent loop. Asserts manifest carries the
        gate decision and the routing finish_reason, AND that no full-loop
        artifacts were created. The full-loop runs ~600-800K tokens; the
        monitoring path runs <10K. Mis-routing in either direction is a
        regression (research → digest underserves the user; monitoring →
        research wastes 600K+ tokens).
    blocked_until: full_loop_eval_harness

  - id: recommendation_routes_to_loop
    category: routing
    query: |
      Best LLM model for a personal companion that adheres to a unique
      personality with extensive memory of past events?
    expected:
      manifest_must_contain:
        gate_decision.bucket: "research_loop"
      manifest_must_not_contain:
        finish_reason: "monitoring_routed_to_digest"
      reasoning: |
        Patch OO counter-test: a recommendation query MUST NOT classify
        as monitoring even though it could superficially be answered from
        a digest. The gate's failure mode is misclassifying research as
        monitoring; this case guards that direction. Pairs with
        monitoring_routes_to_digest above — the two together prove the
        gate works in both directions.
    blocked_until: full_loop_eval_harness

  # ---------- Wave 4 / Patch BBB additions (2026-05-05) ----------
  # These cases exercise Wave 1-3 patches via retrieval-layer assertions
  # so they pass on `python -m evals.run_all` without needing the full-loop
  # harness.

  - id: mention_detection_populates_authorities
    category: authority
    query: |
      Karpathy nanoGPT GPT
    expected:
      must_have_mentioned_authorities:
        min_fraction: 0.05
      reasoning: |
        Patch NN — at least 5% of hits on a Karpathy-related query should
        have non-empty mentioned_authorities frontmatter (populated by
        ingest.mention_detect at write time). The regex-only backfill
        already produced 110+ tagged chunks; once `--use-llm` runs the
        fraction will rise. This case guards the field-population
        contract without a hard threshold that would break on smaller
        corpora.

  - id: mentioned_with_link_engagement_records
    category: authority
    query: |
      authority graph mention detection
    expected:
      must_have_engagements_kind:
        kind: "mentioned_with_link"
        min_count: 50
      reasoning: |
        Patch NN/tag_engagements — extending tag_engagements to write
        `kind='mentioned_with_link'` records from frontmatter
        `mentioned_authorities` is what actually drives the 4× retrieval
        boost on third-party content. The backfill produced 134 records;
        this case asserts ≥50 to leave headroom for future authority-yaml
        edits while still failing if the wiring breaks.

  - id: cross_run_memory_finds_personality_query
    category: cross_run_memory
    query: |
      best LLM model with unique personality and memory
    expected:
      must_match_cross_run_memory:
        min_similarity: 0.85
        query: "best LLM model with unique personality and memory"
      reasoning: |
        Patch ZZ — cross-run memory backfilled 7 prior reports including
        4 personality+memory queries. A new query in that family should
        return at least one match with cosine ≥ 0.85. Guards the
        end-to-end pipeline: embedding works → index loads → cosine
        compute → threshold filter.

  - id: bluesky_source_type_in_corpus
    category: routing
    query: |
      Simon Willison Bluesky AI commentary
    filters:
      source_types: ["bluesky_post"]
    expected:
      must_have_source_types: ["bluesky", "bluesky_post"]
      min_hits: 1
      reasoning: |
        Patch WW — Bluesky native RSS adapter. Filtering search by
        source_type=bluesky_post should return at least one chunk.
        Initial ingestion may produce zero items if the BSky timer
        hasn't run yet — in that case the case will fail honestly,
        signaling the user to run `python -m ingest.run --adapter
        bsky_simon_willison`.
    blocked_until: bluesky_first_run

  - id: github_release_in_corpus
    category: routing
    query: |
      vLLM release notes performance improvements
    filters:
      source_types: ["github_release"]
    expected:
      must_have_source_types: ["github_release", "github-releases"]
      min_hits: 1
      reasoning: |
        Patch RR — GitHub releases.atom adapter. Filtering search by
        source_type=github_release should return at least one chunk
        once the timer has fired. Guards both the adapter wiring and
        the new source_type's directory mapping in run.py.
    blocked_until: github_releases_first_run

  - id: domain_penalty_demotes_aggregator
    category: authority
    query: |
      best embedding models 2026 list comparison
    expected:
      must_avoid_domains: ["medium.com", "hackernoon.com", "locallyuncensored"]
      reasoning: |
        Patch VV — SEO domain penalty at retrieval. A "best of"-shaped
        query is exactly the pattern that surfaces aggregator listicles.
        With Patch VV active, those domains rank lower and shouldn't
        appear in top-3. Guards the retrieval-time penalty as opposed
        to the prior prompt-only Patch AA.

  - id: corpus_count_returns_positive
    category: tooling
    query: |
      neural network attention transformer
    expected:
      min_hits: 1
      reasoning: |
        Patch DDD — corpus_count tool exists and returns a positive
        count for a generic ML query. Tested via the standard search
        path; corpus_count is a thin wrapper over the same scan.
        Counter-fails if corpus is completely empty or if the tool
        was inadvertently removed.

  - id: entity_filter_narrows_results
    category: tooling
    query: |
      AI lab research findings
    filters:
      entity: "karpathy"
    expected:
      must_mention:
        - any of: ["Karpathy", "karpathy"]
      min_hits: 1
      reasoning: |
        Patch DDD — entity filter on search() restricts to chunks whose
        mentioned_authorities or mentioned_entities contains the value
        (case-insensitive substring). With "karpathy" filter, every hit
        should have Karpathy in its mentioned_* arrays. This relies on
        Patch NN having populated mentioned_authorities — fails honestly
        if mention detection hasn't run.
